<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre GL JS 3D Experiment</title>
    <!-- MapLibre GL CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: #1a1a1a; }
        #map { width: 100%; height: 100%; }
        .title-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(30, 30, 35, 0.85);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="title-overlay">
        <h2>MapLibre GL JS 3D Experiment</h2>
        <a href="/" style="color: #3b82f6; text-decoration: none;">&larr; Back to Main Map</a>
    </div>
    <div id="map"></div>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script>
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/dark',
            center: [31.0, 49.0], // Longitude, Latitude (Centered on Ukraine, like the main map)
            zoom: 6,
            pitch: 45, // 3D perspective
            bearing: 0
        });

        map.addControl(new maplibregl.NavigationControl({
            visualizePitch: true
        }));
    </script>
</body>
</html>
