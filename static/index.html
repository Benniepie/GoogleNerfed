<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATP Geopolitics Front Line Map</title>
    <script
    src="https://atpgeo.com/analytics/script.js"
    data-site-id="78f4a20fe6ab"
    defer></script>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MapLibre GL -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.20/leaflet-maplibre-gl.js"></script>
    <!-- Search -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <!-- ToGeoJSON / ToKML-->
    <script src="https://unpkg.com/tokml/tokml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>

    <style>
        :root {
            --bg-color: rgba(30, 30, 35, 0.85);
            --text-color: #e2e8f0;
            --border-color: #475569;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --success-color: #22c55e;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1a1a1a; }
        #map { width: 100%; height: 100%; }
        
        /* --- 2. THE GLASSMORPHISM SLIDE-OUT PANEL --- */
        .control-panel {
            position: fixed;
            top: 0;
            right: -340px; /* Hidden off-screen by default */
            width: 320px;
            height: 100vh;
            background: rgba(20, 20, 25, 0.45); /* Translucent dark */
            backdrop-filter: blur(15px); /* Glassmorphism */
            -webkit-backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            box-sizing: border-box;
            z-index: 2000;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth slide */
            color: #f8fafc;
        }

        .control-panel.open {
            right: 0; /* Slides into view when this class is added via the Hamburger */
        }/* --- 2. THE GLASSMORPHISM SLIDE-OUT PANEL --- */



        .control-panel h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .control-panel.collapsed .basemap-switcher,
        .control-panel.collapsed .layer-list,
        .control-panel.collapsed .upload-section {
            display: none;
        }

        .control-panel.collapsed {
            width: auto;
        }

        /* --- 3. ACCORDION SECTIONS --- */
        .section-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 6px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        .section-header:hover { background: rgba(255, 255, 255, 0.1); }
        .section-content { padding: 10px 5px; display: flex; flex-direction: column; gap: 8px; }
        .collapsed { display: none !important; }
   
/* --- 4. SCROLLABLE LAYER LISTS (Mobile Friendly) --- */
        .layer-list { display: flex; flex-direction: column; gap: 8px; }
        .layer-scroll {
            max-height: 180px; /* Forces scrolling if too many layers are open */
            overflow-y: auto;
            padding-right: 5px;
        }
        .layer-scroll::-webkit-scrollbar { width: 6px; }
        .layer-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
/* --- 5. YOUR FUNCTIONAL ITEMS (Kept exactly as they were) --- */
        .layer-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 3px 6px; border-radius: 4px;
            font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.05);
        }
        .layer-actions { display: flex; gap: 4px; }
        .color-box { width: 14px; height: 14px; display: inline-block; border-radius: 3px; margin-right: 6px; border: 1px solid rgba(255,255,255,0.3); }
        .icon-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 2px 4px; font-size: 1rem; transition: color 0.2s; }
        .icon-btn:hover { color: white; }
        .icon-btn.delete:hover { color: #ef4444; }
        
        .primary-btn { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .primary-btn:hover { opacity: 0.9; }
        .upload-section { border-top: 1px solid #334155; margin-top: 15px; padding-top: 15px; }
        .status-msg { margin-top: 8px; font-size: 0.85rem; color: #10b981; display: none; }

 /* --- 6. NEW UI ELEMENTS (Hamburger & Scrubbing) --- */
        .hamburger-btn {
            background: rgba(30, 30, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.2s;
        }
        .hamburger-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* Customizing Leaflet Bars (Zoom) to match Hamburger */
        .leaflet-bar {
            background: rgba(30, 30, 35, 0.85) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3) !important;
            overflow: hidden;
        }
        .leaflet-bar a {
            background-color: transparent !important;
            color: white !important;
            width: 40px !important;
            height: 40px !important;
            line-height: 40px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 1.2rem !important;
            font-weight: bold !important;
            transition: background 0.2s !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important;
        }
        .leaflet-bar a:hover {
            background: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        .leaflet-bar a:last-child {
            border-bottom: none !important;
        }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            text-decoration: none !important;
        }

        .leaflet-control-scale-line {
            background: rgba(255, 255, 255, 0.4) !important;
            text-shadow: none !important;
        }

        /* Customizing Geocoder to match Hamburger */
        .leaflet-control-geocoder {
            background: rgba(30, 30, 35, 0.85) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 8px !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3) !important;
            transition: background 0.2s;
            color: white !important;
        }
        .leaflet-control-geocoder:hover {
            background: rgba(50, 50, 55, 0.85) !important;
        }

        .leaflet-control-geocoder-icon {
            background-color: transparent !important;
            width: 40px !important;
            height: 40px !important;
            border-radius: 8px !important;
            filter: invert(1) brightness(2) !important;
        }

        .leaflet-control-geocoder-icon:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        /* Expanded geocoder styling */
        .leaflet-control-geocoder-expanded {
            background: rgba(30, 30, 35, 0.95) !important;
        }
        .leaflet-control-geocoder-form input {
            color: white !important;
            background: transparent !important;
            height: 40px !important;
            line-height: 40px !important;
            margin: 0 !important;
            padding: 0 10px !important;
        }
        .leaflet-control-geocoder-form input::placeholder {
            color: #aaa !important;
        }

        /* Geocoder results list */
        .leaflet-control-geocoder-alternatives {
            background: rgba(30, 30, 35, 0.95) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-bottom-left-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            color: white !important;
            width: 100% !important;
        }
        .leaflet-control-geocoder-alternatives li {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            white-space: normal !important;
            height: auto !important;
            padding: 8px !important;
        }
        .leaflet-control-geocoder-alternatives li a {
            height: auto !important;
            line-height: 1.4 !important;
            display: block !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }
        .leaflet-control-geocoder-alternatives li:hover,
        .leaflet-control-geocoder-selected {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }
        .leaflet-control-geocoder-address-context {
            color: #aaa !important;
        }

        .scrubbing-float {
            position: fixed !important;
            bottom: 90px !important;
            right: 20px !important;
            left: auto !important;
            transform: none !important;
            background: rgba(20, 20, 25, 0.85) !important;
            padding: 15px 25px !important;
            border-radius: 12px;
            z-index: 3000;
            width: 320px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: var(--text-color);
        }


        /* Base Map Switcher */
        .basemap-switcher { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; }
        .basemap-switcher label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .layer-list { max-height: 250px; overflow-y: auto; margin-bottom: 0px; padding-right: 5px; }
        
        /* Custom Scrollbar for layer list */
        .layer-list::-webkit-scrollbar { width: 6px; }
        .layer-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .layer-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .layer-item { display: flex; align-items: center; padding: 0px; border-radius: 6px; cursor: grab; transition: background-color 0.2s, transform 0.2s; }
        .layer-item.dragging { opacity: 0.5; transform: scale(0.98); }
        .layer-item.drag-over { border-top: 2px solid var(--accent-color); }
        .layer-item input[type="checkbox"] { cursor: pointer; accent-color: var(--accent-color); }
        .layer-item label { margin-left: 8px; font-size: 0.9rem; word-break: break-all; cursor: pointer; flex-grow: 1; }
        
        .layer-actions { display: flex; gap: 5px; }
        .icon-btn { 
            background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; 
            color: var(--text-color); transition: background 0.2s; font-size: 1rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-btn.delete:hover { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); }

        .upload-section { border-top: 1px solid var(--border-color); }
        .upload-section form { display: flex; flex-direction: column; gap: 10px; }
        
        input[type="file"] { font-size: 0.85rem; color: var(--text-color); }
        input[type="file"]::file-selector-button {
            background-color: var(--border-color); color: white; border: none; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; margin-right: 10px; transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background-color: #64748b; }

        button.primary-btn {
            background-color: var(--accent-color); color: white; border: none; padding: 10px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        button.primary-btn:hover { background-color: var(--accent-hover); }
        button.primary-btn:disabled { background-color: var(--border-color); cursor: not-allowed; }
        
        .status-msg { font-size: 0.85rem; margin-top: 8px; color: var(--success-color); display: none; text-align: center; }
        .error-msg { color: var(--danger-color); }
        
        /* Dark theme for Leaflet Popups */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(30, 30, 35, 0.95);
            color: var(--text-color);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
        }
        .leaflet-popup-content h3 { margin: 0 0 8px 0; font-size: 1.1em; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
        .leaflet-popup-content p { margin: 0; color: #cbd5e1; font-size: 0.9rem; }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-color); }

        /* Color Picker Modal */
        #colorModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;
        }
        /* Admin Modals */
        .modal-content { 
            background: rgba(20, 20, 25, 0.45); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 8px; 
            width: 300px; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        .color-options { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel" id="controlPanel">
        <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            map.atpgeo.com
            <button class="icon-btn" onclick="document.getElementById('controlPanel').classList.remove('open')" title="Close Menu" style="font-size: 1.2rem;">✖</button>
        </h2>

        <div class="section-header" onclick="toggleSection(this)">
            Base Map <span class="toggle-icon">▼</span>
        </div>
        <div class="section-content">
            <div class="basemap-switcher" style="flex-wrap: wrap; border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                <label>
                    <input type="radio" name="basemap" value="dark" checked> Dark
                </label>

                <label>
                    <input type="radio" name="basemap" value="light"> Light
                </label>
<label><input type="radio" name="basemap" value="topo"> Topo</label>
<label><input type="radio" name="basemap" value="hot"> HOT</label><br>
                <label>
                    <input type="radio" name="basemap" value="satellite"> Satellite
                </label>
                <label>
                    <input type="radio" name="basemap" value="satellitehybrid"> Satellite (Hybrid)
                </label><br>
                <label>
                    <input type="radio" name="basemap" value="firefly"> Firefly
                </label>

                <label>
                    <input type="radio" name="basemap" value="fireflyhybrid"> Firefly (Hybrid)
                </label><br>
                <label>
                    <input type="radio" name="basemap" value="s2cloud"> Sentinel2 Cloudless 
                </label>
                <label>
                    <input type="radio" name="basemap" value="s2cloudhybrid"> S2C (Hybrid)
                </label><br>
                <label>
                    <input type="radio" name="basemap" value="s2tc"> 🛰️  Sentinel2 TRUE
                </label>
                <label>
                    <input type="radio" name="basemap" value="s2tchybrid"> S2T (Hybrid)
                </label><br>
                <label>
                    <input type="radio" name="basemap" value="s2nc"> 🛰️  Sentinel2 NATURAL
                </label>
                <label>
                    <input type="radio" name="basemap" value="s2nchybrid"> S2N (Hybrid)
                </label>
              <!-- <label>
                    <input type="radio" name="basemap" value="topopgraphy"> DIY Topographical
                </label> -->
            </div>
        </div>

        <div class="section-header" onclick="toggleSection(this)">
            Live Data Layers <span class="toggle-icon">▼</span>
        </div>
        <div class="section-content collapsed">
            <h3 style="margin: 0 0 10px 0; font-size: 1rem; color: var(--text-color);">🔥 Live FIRMS Data - 48 hours</h3>

            

            <select id="firmsStyleMode" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 6px; background: #ffffff00; color: white; border-radius: 4px;">
                <option value="simple">Simple (All Red)</option>
                <option value="time">Time Since Detection</option>
            </select>

            <div id="firmsTimeKey" style="display: none; margin-bottom: 10px; font-size: 0.8rem; background: rgba(0,0,0,0.01); padding: 8px; border-radius: 4px;">
                <div style="margin-bottom: 4px; font-weight: bold;">Time Since Detection:</div>
                <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 2px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#7f1d1d;"></span> &le; 3 hours</div>
                <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 2px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#dc2626;"></span> &le; 6 hours</div>
                <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 2px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#ea580c;"></span> &le; 12 hours</div>
                <div style="display: flex; align-items: center; gap: 5px;"><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:#eab308;"></span> &gt; 12 hours</div>
            </div>

            <div class="layer-item" style="border-left: 3px solid #ef4444;">
                <input type="checkbox" id="nasaFirmsToggle">
                <label for="nasaFirmsToggle" style="font-weight: bold; color: #fca5a5;">Load VIIRS Hybrid Layer</label>
            </div>
            <div id="firmsStatus" style="font-size: 0.8rem; color: #94a3b8; display: none; margin-top: 5px;">Ready.</div>
        </div>

        <div class="section-header" onclick="toggleSection(this)">
            Front Line Tracker <span class="toggle-icon">▼</span>
        </div>
        <div class="section-content">
            <div id="frontlineLayerList" class="layer-list layer-scroll"></div>            
            
            <div id="timelineContainer" style="text-align: center;">
                <label style="font-size: 0.85rem; display: block; margin-bottom: 5px;">Map Timeline: <span id="currentDateDisplay" style="font-weight: bold; color: var(--accent-color);">Latest</span></label>
                <input type="range" id="timelineSlider" min="0" max="0" value="0" style="width: 100%;" disabled>
                <div style="display: flex; justify-content: center; gap: 10px; margin-top: 5px;">
                    <button id="btnTimelineBack" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 4px 10px; border-radius: 4px; cursor: pointer; backdrop-filter: blur(5px);">&lt;</button>
                    <button id="btnTimelineForward" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 4px 10px; border-radius: 4px; cursor: pointer; backdrop-filter: blur(5px);">&gt;</button>
                    <button id="btnTimelineLatest" style="background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-color); padding: 4px 10px; border-radius: 4px; cursor: pointer; backdrop-filter: blur(5px);">Latest</button>
                </div>
            </div>
        </div>

        <div class="section-header" onclick="toggleSection(this)">
            Static Data Layers <span class="toggle-icon">▶</span>
        </div>
        <div class="section-content collapsed">
            <div id="staticLayerList" class="layer-list layer-scroll">
                
            </div>
        </div>

        <div id="admin-panel-container"></div>


    </div>


 
    <script src="/js/map-core.js"></script>
    <script src="/js/map-layers.js"></script>
    <script>
        // If the user has passed the Python Basic Auth and is on the admin route...
        if (window.location.pathname === '/admin') {
            
            // Inject the Admin UI into the Control Panel
            document.getElementById('admin-panel-container').innerHTML = `
                <div class="section-header collapsed" onclick="toggleSection(this)">
                    Map Admin <span class="toggle-icon">▼</span>
                </div>
                <div class="section-content collapsed upload-section" style="border-top: none; padding-top: 10px;">
                    <form id="uploadForm">
                        <input type="file" id="kmlFile" accept=".kml,.kmz" multiple required />
                        <button type="submit" id="uploadBtn" class="primary-btn">Upload Data</button>
                        <div id="statusMsg" class="status-msg"></div>
                    </form>
                    <button class="primary-btn" onclick="openAutomateModal()" style="width: 100%; margin-top: 10px; background: #8b5cf6;">🤖 Automate Update</button>
                    <button class="primary-btn" onclick="exportKML()" style="width: 100%; margin-top: 10px; background: #475569;">⬇️ Export Data</button>
                </div>            
                `;

            // Load the Engine Room (Geoprocessing, Uploads, Styling)
            const adminScript = document.createElement('script');
            adminScript.src = '/admin_assets/map-admin.js';
            document.body.appendChild(adminScript);
        
            // If they are public, kickstart the map immediately without the admin tools
        
        }
        loadSettingsAndInit();
    </script>    
  
</body>
</html>
