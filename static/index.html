<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMaps Open Source Clone</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MapLibre GL CSS -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        :root {
            --bg-color: rgba(30, 30, 35, 0.85);
            --text-color: #e2e8f0;
            --border-color: #475569;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --success-color: #22c55e;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1a1a1a; }
        #map { width: 100%; height: 100%; }
        
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-panel h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .control-panel.collapsed .basemap-switcher,
        .control-panel.collapsed .layer-list,
        .control-panel.collapsed .upload-section {
            display: none;
        }

        .control-panel.collapsed {
            width: auto;
        }

        /* Base Map Switcher */
        .basemap-switcher { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; }
        .basemap-switcher label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .layer-list { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        
        /* Custom Scrollbar for layer list */
        .layer-list::-webkit-scrollbar { width: 6px; }
        .layer-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .layer-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .layer-item { display: flex; align-items: center; margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; cursor: grab; transition: background-color 0.2s, transform 0.2s; }
        .layer-item.dragging { opacity: 0.5; background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .layer-item.drag-over { border-top: 2px solid var(--accent-color); }
        .layer-item input[type="checkbox"] { cursor: pointer; accent-color: var(--accent-color); }
        .layer-item label { margin-left: 8px; font-size: 0.9rem; word-break: break-all; cursor: pointer; flex-grow: 1; }
        
        .layer-actions { display: flex; gap: 5px; }
        .icon-btn { 
            background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; 
            color: var(--text-color); transition: background 0.2s; font-size: 1rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-btn.delete:hover { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); }

        .upload-section { border-top: 1px solid var(--border-color); padding-top: 15px; }
        .upload-section form { display: flex; flex-direction: column; gap: 10px; }
        
        input[type="file"] { font-size: 0.85rem; color: var(--text-color); }
        input[type="file"]::file-selector-button {
            background-color: var(--border-color); color: white; border: none; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; margin-right: 10px; transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background-color: #64748b; }

        button.primary-btn {
            background-color: var(--accent-color); color: white; border: none; padding: 10px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        button.primary-btn:hover { background-color: var(--accent-hover); }
        button.primary-btn:disabled { background-color: var(--border-color); cursor: not-allowed; }
        
        .status-msg { font-size: 0.85rem; margin-top: 8px; color: var(--success-color); display: none; text-align: center; }
        .error-msg { color: var(--danger-color); }
        
        /* Dark theme for Leaflet Popups */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: rgba(30, 30, 35, 0.95);
            color: var(--text-color);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
        }
        .leaflet-popup-content h3 { margin: 0 0 8px 0; font-size: 1.1em; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
        .leaflet-popup-content p { margin: 0; color: #cbd5e1; font-size: 0.9rem; }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-color); }

        /* Color Picker Modal */
        #colorModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-color); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);
            color: white; width: 250px; text-align: center; backdrop-filter: blur(10px);
        }
        .color-options { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel" id="controlPanel">
        <h2>
            MyMaps Control
            <div>
                <button class="icon-btn" id="settingsBtn" title="Settings" style="font-size: 1rem; margin-right: 5px;">⚙️</button>
                <button class="icon-btn" id="collapseBtn" title="Toggle Panel" style="font-size: 1rem;">➖</button>
            </div>
        </h2>

        <div class="basemap-switcher" style="flex-wrap: wrap;">
            <label>
                <input type="radio" name="basemap" value="dark" checked> Dark Map
            </label>
            <label>
                <input type="radio" name="basemap" value="satellite"> Satellite
            </label>
            <label>
                <input type="radio" name="basemap" value="hybrid"> Hybrid
            </label>
            <label>
                <input type="radio" name="basemap" value="firefly"> Firefly
            </label>
            <label>
                <input type="radio" name="basemap" value="fireflyHybrid"> Firefly Hybrid
            </label>
        </div>

        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);">
            <h3 style="margin: 0 0 10px 0; font-size: 1rem; color: var(--text-color);">🔥 Live FIRMS Data (Global)</h3>

            <input type="password" id="firmsApiKey" value="ad28c643441e17360bb136f8da9189bb" placeholder="Enter NASA FIRMS API Key" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 6px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; border-radius: 4px;">

            <select id="firmsStyleMode" style="width: 100%; box-sizing: border-box; margin-bottom: 10px; padding: 6px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: white; border-radius: 4px;">
                <option value="simple">Simple (All Red)</option>
                <option value="time">Time Since Detection</option>
            </select>

            <div class="layer-item" style="border-left: 3px solid #ef4444;">
                <input type="checkbox" id="nasaFirmsToggle">
                <label for="nasaFirmsToggle" style="font-weight: bold; color: #fca5a5;">Load VIIRS Hybrid Layer</label>
            </div>
            <div id="firmsStatus" style="font-size: 0.8rem; color: #94a3b8; display: none; margin-top: 5px;">Ready.</div>
        </div>

        <div class="layer-list" id="layerList">
            <em style="font-size: 0.9rem; color: #94a3b8;">Loading layers...</em>
        </div>


        <div class="upload-section">
            <form id="uploadForm">
                <input type="file" id="kmlFile" accept=".kml,.kmz" multiple required />
                <button type="submit" id="uploadBtn" class="primary-btn">Upload KML / KMZ</button>
                <div id="statusMsg" class="status-msg">Upload complete!</div>
            </form>
            <button class="primary-btn" onclick="openAutomateModal()" style="width: 100%; margin-top: 10px; background: #8b5cf6;">🤖 Automate Map Update</button>
            <button class="primary-btn" onclick="exportKML()" style="width: 100%; margin-top: 10px; background: var(--border-color);">⬇️ Export Displayed Data</button>
        </div>

        <div id="timelineContainer" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); text-align: center;">
            <label style="font-size: 0.85rem; display: block; margin-bottom: 5px;">Map Timeline: <span id="currentDateDisplay" style="font-weight: bold; color: var(--accent-color);">Latest</span></label>
            <input type="range" id="timelineSlider" min="0" max="0" value="0" style="width: 100%;" disabled>
        </div>

    </div>


    <!-- Automate Update Modal -->
    <div id="automateModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;">
        <div class="modal-content" style="width: 350px;">
            <h3 style="margin-top:0;">🤖 Automate Update</h3>
            <p style="font-size:0.85rem; color:#cbd5e1; margin-bottom: 15px;">Run geoprocessing to calculate Ukraine/Russian gains automatically.</p>

            <form id="automateForm">
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight: bold; color: #a78bfa;">Layer Date</label>
                    <input type="date" id="updateDate" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px;">
                </div>

                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight: bold; color: #a78bfa;">AP Maps Process</label>

                    <label style="display:block; margin-bottom:3px; font-size: 0.8rem; color: #94a3b8;">Base AP Layer (Old):</label>
                    <select id="oldApLayerSelect" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
                        <option value="">-- Do not process AP Map --</option>
                    </select>

                    <label style="display:block; margin-bottom:3px; font-size: 0.8rem; color: #94a3b8;">New AP URL (.kml or .kmz) OR Upload:</label>
                    <input type="url" id="newApUrl" placeholder="https://www.google.com/maps/d/kml?mid=...&forcekml=1" value="https://www.google.com/maps/d/kml?mid=1gO8X7RC8cUzc-1q7-s4-09X53HNIEJA&forcekml=1" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
                    <input type="file" id="newApFile" accept=".kml,.kmz" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box;">
                </div>

                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight: bold; color: #a78bfa;">SM Maps Process</label>

                    <label style="display:block; margin-bottom:3px; font-size: 0.8rem; color: #94a3b8;">Base SM Layer (Old):</label>
                    <select id="oldSmLayerSelect" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
                        <option value="">-- Do not process SM Map --</option>
                    </select>

                    <label style="display:block; margin-bottom:3px; font-size: 0.8rem; color: #94a3b8;">New SM URL (.kml or .kmz) OR Upload:</label>
                    <input type="url" id="newSmUrl" placeholder="https://www.google.com/maps/d/kml?mid=...&forcekml=1" value="https://www.google.com/maps/d/kml?mid=1V8NzjQkzMOhpuLhkktbiKgodOQ27X6IV&forcekml=1" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px;">
                    <input type="file" id="newSmFile" accept=".kml,.kmz" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 8px; border-radius: 4px; box-sizing: border-box;">
                </div>

                <div id="automateStatus" style="font-size: 0.85rem; margin-bottom: 10px; display: none; text-align: center;"></div>

                <button type="submit" id="automateBtn" class="primary-btn" style="width:100%; margin-bottom:10px;">Run Update</button>
                <button type="button" class="primary-btn" onclick="document.getElementById('automateModal').style.display='none'" style="width:100%; background:var(--border-color);">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;">
        <div class="modal-content">
            <h3 style="margin-top:0;">Settings</h3>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Default Map Center (Lat, Lng):</label>
                <input type="number" id="defaultLat" step="any" style="width: 45%; background: var(--border-color); color: white; border: none; padding: 5px; border-radius: 4px;"> ,
                <input type="number" id="defaultLng" step="any" style="width: 45%; background: var(--border-color); color: white; border: none; padding: 5px; border-radius: 4px;">
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Default Zoom:</label>
                <input type="number" id="defaultZoom" step="0.25" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 5px; border-radius: 4px;">
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Default Basemap:</label>
                <select id="defaultBasemap" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 5px; border-radius: 4px;">
                    <option value="dark">Dark Map</option>
                    <option value="satellite">Satellite</option>
                    <option value="hybrid">Hybrid</option>
                    <option value="firefly">Firefly</option>
                    <option value="fireflyHybrid">Firefly Hybrid</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <button class="icon-btn" onclick="useCurrentView()" style="font-size: 0.9rem; background: rgba(255,255,255,0.1); padding: 5px 10px; width: 100%;">📍 Use Current Map View</button>
            </div>
            <button class="primary-btn" onclick="saveSettings()" style="width:100%; margin-bottom:10px;">Save Settings</button>
            <button class="primary-btn" onclick="document.getElementById('settingsModal').style.display='none'" style="width:100%; background:var(--border-color);">Close</button>
        </div>
    </div>

    <!-- Style Picker Modal -->
    <div id="colorModal">
        <div class="modal-content" style="width: 320px;">
            <h3 style="margin-top:0;">Layer Styling</h3>
            <p id="stylingLayerName" style="font-size:0.8rem; color:#94a3b8; word-break:break-all;"></p>

            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Style Type:</label>
                <select id="styleTypeSelect" style="width: 100%; background: var(--border-color); color: white; border: none; padding: 5px; border-radius: 4px;" onchange="renderColorPickers()">
                    <option value="single">Single Style</option>
                    <option value="grouped">Group by Name</option>
                </select>
            </div>

            <div id="colorPickerContainer" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px;">
                <!-- Dynamically populated -->
            </div>

            <button class="primary-btn" onclick="applyStyle()" style="width:100%; margin-bottom: 10px;">Save Style</button>
            <button class="primary-btn" onclick="document.getElementById('colorModal').style.display='none'" style="width:100%; background:var(--border-color);">Close</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <!-- MapLibre GL Leaflet Binding -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.20/leaflet-maplibre-gl.js"></script>
    <!-- toGeoJSON (Parses KML to GeoJSON) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <!-- tokml (Parses GeoJSON to KML) -->
    <script src="https://unpkg.com/tokml/tokml.js"></script>

    <script>
        // 1. Initialise the Map
        const map = L.map('map', { zoomControl: false, zoomSnap: 0.25, zoomDelta: 0.25 }).setView([49.0, 31.0], 6); // Default view centered on Ukraine
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Base Maps Setup
        const esriAttribution = 'Tiles &copy; Esri - Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community';
        const esriLabelAttribution = '&copy; Esri - National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC';

        const baseMaps = {
            dark: L.maplibreGL({
                style: 'https://tiles.openfreemap.org/styles/dark',
                attribution: '&copy; <a href="https://openfreemap.org" target="_blank">OpenFreeMap</a>'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: esriAttribution
            }),
            firefly: L.tileLayer('https://fly.maptiles.arcgis.com/arcgis/rest/services/World_Imagery_Firefly/MapServer/tile/{z}/{y}/{x}', {
                attribution: esriAttribution
            })
        };

        // Create the transparent labels overlay
        const labelsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
            attribution: esriLabelAttribution,
            pane: 'tooltipPane' // This forces labels to render on top of polygons!
        });

        // Bundle the base maps with the labels to create 'Hybrid' options
        baseMaps.hybrid = L.layerGroup([baseMaps.satellite, labelsLayer]);
        baseMaps.fireflyHybrid = L.layerGroup([baseMaps.firefly, labelsLayer]);

        // --- LIVE DATA: NASA FIRMS (Hybrid Raster/Vector) ---
        const ZOOM_THRESHOLD = 8; // Zoom level at which we switch from Raster to Vector
        let isFirmsActive = false;

        // 1. The Raster Layer (for zoomed-out global views)
        const snppRasterLayer = L.tileLayer.wms("https://gibs.earthdata.nasa.gov/wms/epsg3857/best/wms.cgi", {
            layers: 'VIIRS_SNPP_Thermal_Anomalies_375m_All',
            format: 'image/png',
            transparent: true,
            attribution: '&copy; NASA EOSDIS GIBS',
            zIndex: 100
        });

        const noaa20RasterLayer = L.tileLayer.wms("https://gibs.earthdata.nasa.gov/wms/epsg3857/best/wms.cgi", {
            layers: 'VIIRS_NOAA20_Thermal_Anomalies_375m_All',
            format: 'image/png',
            transparent: true,
            zIndex: 101
        });

        const nasaRasterLayer = L.layerGroup([snppRasterLayer, noaa20RasterLayer]);

        // 2. The Vector Layer (for zoomed-in detailed views)
        let firmsVectorGroup = L.layerGroup();
        let currentFirmsData = [];

        async function fetchAndRenderFirmsBBox() {
            const apiKey = document.getElementById('firmsApiKey').value.trim();
            const statusEl = document.getElementById('firmsStatus');

            if (!apiKey) {
                alert("Please enter a NASA FIRMS API Key.");
                return;
            }

            statusEl.style.display = 'block';
            statusEl.textContent = 'Fetching vector data (SNPP & NOAA-20)...';
            statusEl.style.color = '#94a3b8';

            // Calculate Bounding Box
            const bounds = map.getBounds();
            const bbox = `${bounds.getWest() - 0.5},${bounds.getSouth() - 0.5},${bounds.getEast() + 0.5},${bounds.getNorth() + 0.5}`;

            // Query both primary VIIRS satellites over 2 days to match the Raster composite
            const sources = ['VIIRS_SNPP_NRT', 'VIIRS_NOAA20_NRT'];

            try {
                // Fire off both API requests at the same time
                const fetchPromises = sources.map(source =>
                    fetch(`https://firms.modaps.eosdis.nasa.gov/api/area/csv/${apiKey}/${source}/${bbox}/2`)
                );

                const responses = await Promise.all(fetchPromises);

                let allRows = [];
                let headers = [];

                for (const response of responses) {
                    if (!response.ok) throw new Error("API limits reached or invalid area.");

                    const csvText = await response.text();
                    const rows = csvText.split('\n').filter(row => row.trim() !== '');

                    // If we have more than just the header row
                    if (rows.length > 1) {
                        if (headers.length === 0) {
                            headers = rows.shift().split(','); // Keep headers from the first file
                        } else {
                            rows.shift(); // Discard headers from the second file
                        }
                        allRows.push(...rows); // Merge the data
                    }
                }

                if (allRows.length === 0) {
                    currentFirmsData = [];
                    firmsVectorGroup.clearLayers();
                    statusEl.textContent = 'No thermal anomalies in this specific view.';
                    statusEl.style.color = '#94a3b8';
                    return;
                }

                // Parse our newly combined massive dataset
                currentFirmsData = allRows.map(row => {
                    const values = row.split(',');
                    let data = {};
                    headers.forEach((header, index) => { data[header] = values[index]; });
                    return data;
                });

                renderFirmsVectorData();

                statusEl.textContent = `Loaded ${currentFirmsData.length} active fires.`;
                statusEl.style.color = '#22c55e';

            } catch (error) {
                console.error("FIRMS Error:", error);
                statusEl.textContent = 'Error fetching vector data.';
                statusEl.style.color = '#ef4444';
            }
        }

        function renderFirmsVectorData() {
            firmsVectorGroup.clearLayers();
            const styleMode = document.getElementById('firmsStyleMode').value;
            const now = new Date();

            currentFirmsData.forEach(fire => {
                if (!fire.latitude || !fire.longitude) return;

                const timeStr = fire.acq_time.padStart(4, '0');
                const isoString = `${fire.acq_date}T${timeStr.substring(0,2)}:${timeStr.substring(2,4)}:00Z`;
                const fireTime = new Date(isoString);
                const ageHours = (now - fireTime) / (1000 * 60 * 60);

                let fillColor = '#ef4444';
                let fillOpacity = 0.6;

                if (styleMode === 'time') {
                    if (ageHours <= 3) { fillColor = '#7f1d1d'; fillOpacity = 0.9; }
                    else if (ageHours <= 6) { fillColor = '#dc2626'; fillOpacity = 0.8; }
                    else if (ageHours <= 12) { fillColor = '#ea580c'; fillOpacity = 0.7; }
                    else { fillColor = '#eab308'; fillOpacity = 0.5; }
                }

                const fireCircle = L.circle([parseFloat(fire.latitude), parseFloat(fire.longitude)], {
                    color: fillColor,
                    weight: 1,
                    fillColor: fillColor,
                    fillOpacity: fillOpacity,
                    radius: 187.5 // 375m VIIRS footprint
                });

                fireCircle.bindPopup(`
                    <b>Thermal Anomaly</b><br>
                    Detected: ${fire.acq_date} at ${timeStr} UTC<br>
                    Age: ${Math.round(ageHours)} hours ago<br>
                    Confidence: ${fire.confidence}
                `);

                firmsVectorGroup.addLayer(fireCircle);
            });
        }

        // 3. Fetch and Render Layers
        async function loadLayers() {
            try {
                const response = await fetch('/api/layers');
                const data = await response.json();
                
                const layerListEl = document.getElementById('layerList');
                layerListEl.innerHTML = ''; 
                
                if (data.layers.length === 0) {
                    layerListEl.innerHTML = '<em style="font-size: 0.9rem; color: #94a3b8;">No layers available.</em>';
                    return;
                }

                                // Sort layers by user's saved order if it exists
                let sortedLayers = data.layers;
                if (appSettings.layerOrder && appSettings.layerOrder.length > 0) {
                    sortedLayers.sort((a, b) => {
                        const idxA = appSettings.layerOrder.indexOf(a);
                        const idxB = appSettings.layerOrder.indexOf(b);
                        if (idxA === -1 && idxB === -1) return 0;
                        if (idxA === -1) return 1; // Unordered items go to bottom
                        if (idxB === -1) return -1;
                        return idxA - idxB;
                    });
                }

                for (const filename of sortedLayers) {
                    const item = document.createElement('div');
                    item.className = 'layer-item';
                    item.draggable = true;
                    item.dataset.filename = filename;

                    // Drag and Drop Events
                    item.addEventListener('dragstart', (e) => {
                        item.classList.add('dragging');
                        e.dataTransfer.setData('text/plain', filename);
                    });

                    item.addEventListener('dragend', () => {
                        item.classList.remove('dragging');
                        document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('drag-over'));
                        saveLayerOrder(); // Save new order to backend
                    });

                    item.addEventListener('dragover', (e) => {
                        e.preventDefault(); // Necessary to allow dropping
                        item.classList.add('drag-over');
                    });

                    item.addEventListener('dragleave', () => {
                        item.classList.remove('drag-over');
                    });

                    item.addEventListener('drop', (e) => {
                        e.preventDefault();
                        item.classList.remove('drag-over');
                        const draggingFile = e.dataTransfer.getData('text/plain');
                        if (draggingFile === filename) return;

                        const draggingEl = document.querySelector(`.layer-item[data-filename="${draggingFile}"]`);
                        const layerList = document.getElementById('layerList');

                        // Determine whether to insert before or after
                        const allItems = [...layerList.querySelectorAll('.layer-item')];
                        const dropIdx = allItems.indexOf(item);
                        const dragIdx = allItems.indexOf(draggingEl);

                        if (dragIdx < dropIdx) {
                            item.after(draggingEl);
                        } else {
                            item.before(draggingEl);
                        }
                    });
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = 'chk_' + filename;
                    checkbox.checked = true;
                    
                    const label = document.createElement('label');
                    label.htmlFor = 'chk_' + filename;
                    label.textContent = filename;
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'layer-actions';

                    // Style Button
                    const styleBtn = document.createElement('button');
                    styleBtn.className = 'icon-btn';
                    styleBtn.innerHTML = '🎨';
                    styleBtn.title = 'Change Colour';
                    styleBtn.onclick = () => openColorPicker(filename);

                    // Delete Button
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'icon-btn delete';
                    deleteBtn.innerHTML = '🗑️';
                    deleteBtn.title = 'Delete Layer';
                    deleteBtn.onclick = () => deleteLayer(filename);
                    
                    actionsDiv.appendChild(styleBtn);
                    actionsDiv.appendChild(deleteBtn);

                    item.appendChild(checkbox);
                    item.appendChild(label);
                    item.appendChild(actionsDiv);
                    layerListEl.appendChild(item);

                    // Initially hide the layer item until the timeline sorts it out
                    item.style.display = 'none';

                    // Load KML
                    await fetchAndAddKML(filename);

                    // Toggle visibility
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            if (activeLayers[filename]) map.addLayer(activeLayers[filename]);
                        } else {
                            if (activeLayers[filename]) map.removeLayer(activeLayers[filename]);
                        }
                    });
                }
                updateTimeline();
                reorderActiveLayers();
                // Force dispatch the event so the map actually updates to only show the latest
                const slider = document.getElementById('timelineSlider');
                slider.dispatchEvent(new Event('input'));
            } catch (err) {
                console.error("Failed to load layers:", err);
            }
        }

        async function fetchAndAddKML(filename) {
            try {
                const response = await fetch(`/data/${filename}?t=${new Date().getTime()}`);
                const kmlText = await response.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                const geoJsonData = toGeoJSON.kml(xmlDoc);

                const styleConfig = layerStyles[filename] || { type: 'single', color: '#3b82f6', opacity: 0.5 }; // Default style

                function getFeatureStyle(feature) {
                    if (styleConfig.type === 'grouped' && styleConfig.styles) {
                        const name = feature.properties ? feature.properties.name : null;
                        if (name && styleConfig.styles[name]) {
                            return styleConfig.styles[name];
                        }
                    }
                    return { color: styleConfig.color || '#3b82f6', opacity: styleConfig.opacity !== undefined ? styleConfig.opacity : 0.5 };
                }

                const layer = L.geoJSON(geoJsonData, {
                    // Style for polygons/lines
                    style: function (feature) {
                        const style = getFeatureStyle(feature);
                        return { color: style.color, weight: 2, fillOpacity: style.opacity };
                    },
                    // Style for points/markers
                    pointToLayer: function (feature, latlng) {
                        const style = getFeatureStyle(feature);
                        return L.circleMarker(latlng, {
                            radius: 6,
                            fillColor: style.color,
                            color: '#ffffff',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: style.opacity
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        let popupContent = "";
                        if (feature.properties && feature.properties.name) {
                            popupContent += "<h3>" + feature.properties.name + "</h3>";
                        }
                        if (feature.properties && feature.properties.description) {
                            popupContent += "<p>" + feature.properties.description + "</p>";
                        }
                        if (popupContent) {
                            layer.bindPopup(popupContent);
                        }
                    }
                });

                if (activeLayers[filename]) {
                    map.removeLayer(activeLayers[filename]);
                }

                layer.addTo(map);
                activeLayers[filename] = layer;

            } catch (err) {
                console.error(`Error processing KML ${filename}:`, err);
            }
        }

        // --- Styling Logic ---

        function openColorPicker(filename) {

        function renderColorPickers(existingStyle = null) {
            const container = document.getElementById('colorPickerContainer');
            const type = document.getElementById('styleTypeSelect').value;
            container.innerHTML = ''; // Clear existing

            if (type === 'single') {
                const color = existingStyle?.color || '#3b82f6';
                const opacity = existingStyle?.opacity !== undefined ? existingStyle.opacity : 0.5;

                container.innerHTML = `
                    <div style="margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px;">
                        <label>Color:</label>
                        <input type="color" id="singleColor" value="${color}" style="width: 100%; height: 30px;">
                        <label>Opacity: <span id="singleOpacityVal">${opacity}</span></label>
                        <input type="range" id="singleOpacity" min="0" max="1" step="0.1" value="${opacity}" oninput="document.getElementById('singleOpacityVal').textContent=this.value">
                    </div>
                `;
            } else if (type === 'grouped') {
                const uniqueNames = new Set();
                currentStylingFeatures.forEach(f => {
                    if (f.properties && f.properties.name) {
                        uniqueNames.add(f.properties.name);
                    }
                });

                if (uniqueNames.size === 0) {
                    container.innerHTML = '<p style="font-size: 0.85rem; color: #cbd5e1;">No named features found in this layer.</p>';
                    return;
                }

                Array.from(uniqueNames).sort().forEach((name, index) => {
                    const style = (existingStyle?.styles && existingStyle.styles[name]) || { color: '#3b82f6', opacity: 0.5 };

                    const row = document.createElement('div');
                    row.style.cssText = "margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color);";

                    row.innerHTML = `
                        <div style="font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; word-break: break-all;">${name}</div>
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <label style="width: 60px;">Color:</label>
                                <input type="color" class="groupColor" data-name="${name}" value="${style.color}" style="flex-grow: 1; height: 30px;">
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <label style="width: 60px;">Opacity:</label>
                                <input type="range" class="groupOpacity" data-name="${name}" min="0" max="1" step="0.1" value="${style.opacity}" style="flex-grow: 1;" oninput="this.nextElementSibling.textContent=this.value">
                                <span style="width: 25px; font-size: 0.85rem;">${style.opacity}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }
        }

        function applyStyle() {
            if (!currentStylingLayer) return;
            
            const type = document.getElementById('styleTypeSelect').value;
            let styleConfig = { type: type };

            if (type === 'single') {
                const colorInput = document.getElementById('singleColor');
                const opacityInput = document.getElementById('singleOpacity');
                if (!colorInput) return; // Safely handle if empty

                styleConfig.color = colorInput.value;

            } else if (type === 'grouped') {
                styleConfig.styles = {};
                const colorInputs = document.querySelectorAll('.groupColor');

                colorInputs.forEach((input, index) => {
                    const name = input.getAttribute('data-name');

                    styleConfig.styles[name] = { color: input.value, opacity: opacity };
                });
            }

            layerStyles[currentStylingLayer] = styleConfig;
            saveStylesToServer();
            
            // Reload just this layer to apply style
            fetchAndAddKML(currentStylingLayer).then(() => {

        // --- Export KML ---
        function exportKML() {
            const features = [];
            for (const filename in activeLayers) {
                if (activeLayers.hasOwnProperty(filename)) {
                    activeLayers[filename].eachLayer(layer => {
                        if (layer.feature) {
                            features.push(layer.feature);
                        }
                    });
                }
            }

            if (features.length === 0) {
                alert("No data to export.");
                return;
            }

            const geoJsonData = {
                type: "FeatureCollection",
                features: features
            };

            try {
                const kmlStr = tokml(geoJsonData, {
                    documentName: "MyMaps Export",
                    documentDescription: "Exported from MyMaps Clone",
                    name: "name",
                    description: "description"
                });

                const blob = new Blob([kmlStr], { type: "application/vnd.google-earth.kml+xml" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "export.kml";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error("Error exporting KML:", err);

            }
        }




        function reorderActiveLayers() {
            const items = document.querySelectorAll('.layer-item');
            const newOrder = [];
            items.forEach(i => newOrder.push(i.dataset.filename));

            for (let i = newOrder.length - 1; i >= 0; i--) {

        // --- Timeline & Automation Logic ---
        let availableDates = [];

        function extractDateFromFilename(filename) {
            // Looks for YYYY-MM-DD pattern
            const match = filename.match(/(\d{4}-\d{2}-\d{2})/);
            if (match) return match[1];

            // Looks for DD MM pattern
            const altMatch = filename.match(/(\d{2})[ _]?(\d{2})/);
            if (altMatch) return `2026-${altMatch[2]}-${altMatch[1]}`; // Default to 2026 per user

            return null;
        }

        function updateTimeline() {
            const datesSet = new Set();
            for (const filename in activeLayers) {
                const d = extractDateFromFilename(filename);
                if (d) datesSet.add(d);
            }

            availableDates = Array.from(datesSet).sort();
            const slider = document.getElementById('timelineSlider');
            const display = document.getElementById('currentDateDisplay');

            if (availableDates.length > 0) {
                slider.disabled = false;
                slider.max = availableDates.length - 1;

                // If this is the very first time we're setting it, or if it was empty, default to latest.
                // Otherwise, preserve the current selected date index if it's still valid.
                let newIndex = slider.value;
                const currentDate = display.textContent;
                const foundIndex = availableDates.indexOf(currentDate);

                if (currentDate === 'Latest' || foundIndex === -1) {
                    newIndex = availableDates.length - 1;
                } else {
                    newIndex = foundIndex;
                }

                slider.value = newIndex;
                display.textContent = availableDates[newIndex];
            } else {
                slider.disabled = true;
                slider.value = 0;
                display.textContent = "Latest";
            }
        }

        document.getElementById('timelineSlider').addEventListener('input', (e) => {
            if (availableDates.length === 0) return;
            const idx = e.target.value;
            const selectedDate = availableDates[idx];
            document.getElementById('currentDateDisplay').textContent = selectedDate;

            // Toggle layer map visibility AND UI list visibility
            for (const filename in activeLayers) {
                const layerDate = extractDateFromFilename(filename);

                // Find the UI container for this layer
                const chk = document.getElementById('chk_' + filename);
                const layerItemDiv = chk ? chk.closest('.layer-item') : null;

                // If it matches the current timeline date (or lacks a parsable date)
                if (!layerDate || layerDate === selectedDate) {
                    if (layerItemDiv) layerItemDiv.style.display = 'flex'; // Show in UI list

                    const isChecked = chk?.checked;
                    if (isChecked && !map.hasLayer(activeLayers[filename])) {
                        map.addLayer(activeLayers[filename]);
                    }
                } else {
                    if (layerItemDiv) layerItemDiv.style.display = 'none'; // Hide from UI list

                    if (map.hasLayer(activeLayers[filename])) {
                        map.removeLayer(activeLayers[filename]);
                    }
                }
            }

            // Reapply z-index ordering after layers are added/removed
            reorderActiveLayers();
        });

        function openAutomateModal() {
            document.getElementById('automateStatus').style.display = 'none';

            // Set default date to today
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('updateDate').value = `${year}-${month}-${day}`;

            // Populate the dropdowns with currently loaded files from `activeLayers`
            const apSelect = document.getElementById('oldApLayerSelect');
            const smSelect = document.getElementById('oldSmLayerSelect');

            // Clear current options except the "Do not process" one
            apSelect.innerHTML = '<option value="">-- Do not process AP Map --</option>';
            smSelect.innerHTML = '<option value="">-- Do not process SM Map --</option>';

            const filenames = Object.keys(activeLayers).sort().reverse();

            for (const filename of filenames) {
                const normalizedName = filename.toLowerCase().replace(/_/g, ' ');
                if (normalizedName.includes('ap map')) {
                    const opt = document.createElement('option');
                    opt.value = filename;
                    opt.textContent = filename;
                    apSelect.appendChild(opt);
                } else if (normalizedName.includes('sm map')) {
                    const opt = document.createElement('option');
                    opt.value = filename;
                    opt.textContent = filename;
                    smSelect.appendChild(opt);
                }
            }

            // Auto-select the first (latest) if available
            if (apSelect.options.length > 1) apSelect.selectedIndex = 1;
            if (smSelect.options.length > 1) smSelect.selectedIndex = 1;

            document.getElementById('automateModal').style.display = 'flex';
        }

        document.getElementById('automateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldAp = document.getElementById('oldApLayerSelect').value;
            const apUrl = document.getElementById('newApUrl').value;
            const apFile = document.getElementById('newApFile').files[0];

            const oldSm = document.getElementById('oldSmLayerSelect').value;
            const smUrl = document.getElementById('newSmUrl').value;
            const smFile = document.getElementById('newSmFile').files[0];

            const updateDate = document.getElementById('updateDate').value;

            if (!apUrl && !smUrl && !apFile && !smFile) {
                alert('Please provide at least one URL or File');
                return;
            }

            const btn = document.getElementById('automateBtn');
            const status = document.getElementById('automateStatus');

            btn.disabled = true;
            btn.textContent = 'Processing (This may take a minute)...';
            status.style.display = 'block';
            status.style.color = '#e2e8f0';
            status.textContent = 'Downloading and running QGIS models...';

            const formData = new FormData();
            formData.append('new_ap_url', apUrl);
            formData.append('new_sm_url', smUrl);
            formData.append('old_ap_filename', oldAp);
            formData.append('old_sm_filename', oldSm);
            formData.append('update_date', updateDate);
            if (apFile) formData.append('new_ap_file', apFile);
            if (smFile) formData.append('new_sm_file', smFile);

            try {
                const response = await fetch('/api/process_updates', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    let msg = "Success! Generated:<br>";

                    // Copy existing styles to the newly generated layers locally before loading
                    data.results.forEach(r => {
                        if(r.status === 'success') {
                            msg += r.new_files.join('<br>') + '<br>';

                            // Extract filenames for mapping. new_files[0] = Map, new_files[1] = Pins
                            const newMap = r.new_files[0];
                            const newPins = r.new_files[1];

                            if (r.layer === 'AP Map') {
                                const oldApMap = document.getElementById('oldApLayerSelect').value;
                                const oldApPins = oldApMap.replace('Map', 'Pins');

                                if (layerStyles[oldApMap] && newMap) layerStyles[newMap] = JSON.parse(JSON.stringify(layerStyles[oldApMap]));
                                if (layerStyles[oldApPins] && newPins) layerStyles[newPins] = JSON.parse(JSON.stringify(layerStyles[oldApPins]));
                            } else if (r.layer === 'SM Map') {
                                const oldSmMap = document.getElementById('oldSmLayerSelect').value;
                                const oldSmPins = oldSmMap.replace('Map', 'Pins');

                                if (layerStyles[oldSmMap] && newMap) layerStyles[newMap] = JSON.parse(JSON.stringify(layerStyles[oldSmMap]));
                                if (layerStyles[oldSmPins] && newPins) layerStyles[newPins] = JSON.parse(JSON.stringify(layerStyles[oldSmPins]));
                            }
                        } else {
                            msg += `<span style="color:var(--danger-color)">Error processing ${r.layer || ''}: ${r.message}</span><br>`;
                        }
                    });

                    // Save copied styles to backend
                    await saveStylesToServer();

                    status.innerHTML = msg;
                    status.style.color = 'var(--success-color)';

                    // Reload layers to get the new maps with styles applied
                    await loadLayers();

                    setTimeout(() => {
                        document.getElementById('automateModal').style.display = 'none';
                    }, 4000);
                } else {
                    status.textContent = 'Error: ' + (data.detail || 'Unknown error');
                    status.style.color = 'var(--danger-color)';
                }
            } catch (err) {
                status.textContent = 'Network error communicating with server.';
                status.style.color = 'var(--danger-color)';
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run Update';
            }
        });

        // Initial load
        loadSettingsAndInit();
    </script>
</body>
</html>
